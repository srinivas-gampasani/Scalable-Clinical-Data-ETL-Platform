name: clinical_dw
version: "1.0.0"
config-version: 2

profile: clinical_snowflake

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  clinical_dw:
    staging:
      +schema: STAGING
      +materialized: view
      +tags: ["staging", "daily"]
    intermediate:
      +schema: INTERMEDIATE
      +materialized: table
      +tags: ["intermediate", "daily"]
    marts:
      +schema: MARTS
      +materialized: table
      +tags: ["marts", "gold"]
      clinical_ops:
        +materialized: table
      finance:
        +materialized: table
      quality:
        +materialized: table

vars:
  project_name: "Clinical ETL Platform"
  dbt_date_format: "%Y-%m-%d"
  quality_threshold: 0.998
  lookback_days: 90
